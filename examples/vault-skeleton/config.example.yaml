# personal-llm vault config
# This file is generated by `personal-llm init` and edited by you afterwards.
# See docs/ARCHITECTURE.md (§4, §7) in the seed for what each section does.

vault_version: 1

# L1+L2 — the always-on local base model.
local_model:
  backend: ollama
  name: qwen3:8b
  endpoint: http://localhost:11434

# L3+L7 — cloud usage caps and tutor registry.
# Phase 0: tutors list is empty; nothing goes external. Add entries in Phase 1+.
cloud:
  monthly_budget_usd: 100.0
  daily_autonomous_learning_budget_usd: 0.50
  autonomy_mode: daily-approval   # full-autonomy | daily-approval | per-session
  tutors: []
  # Example tutor entry for Phase 1+:
  #   - name: claude-haiku
  #     provider: anthropic
  #     model: claude-haiku-4-5
  #     api_key_env: ANTHROPIC_API_KEY
  #     capabilities: [reasoning, multilingual, coding]
  #     cost_per_mtok: { input: 1.00, output: 5.00 }
  #     daily_budget_usd: 5.00
  #     privacy_class: [public, personal]

# PII redaction list — applied before any external call.
# The init wizard prompts for the required fields; you can extend the `extra` list any time.
redaction:
  display_name: ""
  primary_email: ""
  phone: ""
  home_address: ""
  extra: []
  # extra:
  #   - my employer name
  #   - my github handle

# MCP servers the agent can talk to (Phase 1+ via L6 MCP client).
# See https://modelcontextprotocol.io/ for the protocol.
mcp_servers: []
  # Example:
  #   - name: searxng
  #     command: ["uvx", "mcp-server-searxng", "--url", "http://localhost:8888"]
  #   - name: filesystem
  #     command: ["npx", "@modelcontextprotocol/server-filesystem", "/home/me/Documents"]
